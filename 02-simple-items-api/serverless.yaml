service: items-api

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    TABLE_NAME: Items

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/Items

functions:
  createItem:
    handler: functions/createItem.handler
    events:
      - http:
          path: items
          method: post

  getItem:
    handler: functions/getItem.handler
    events:
      - http:
          path: items/{itemId}
          method: get

  updateItem:
    handler: functions/updateItem.handler
    events:
      - http:
          path: items/{itemId}
          method: put

  deleteItem:
    handler: functions/deleteItem.handler
    events:
      - http:
          path: items/{itemId}
          method: delete

resources:
  Resources:
    ItemsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Items
        AttributeDefinitions:
          - AttributeName: itemId
            AttributeType: S
        KeySchema:
          - AttributeName: itemId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST